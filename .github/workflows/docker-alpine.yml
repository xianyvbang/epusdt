name: docker-alpine-epusdt

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build image for (for example, v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: epusdt

jobs:
  push-ghcr-alpine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Collect build metadata
        id: vars
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag }}"
          if [[ "$TAG_NAME" != v* ]]; then
            echo "tag must start with v, got: $TAG_NAME"
            exit 1
          fi

          echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lower }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=alpine
            type=raw,value=${{ steps.vars.outputs.tag_name }}-alpine
            type=sha,prefix=sha-,suffix=-alpine

      - name: Login To GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            API_RATE_URL=${{ vars.API_RATE_URL }}
            BUILD_VERSION=${{ steps.vars.outputs.tag_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
